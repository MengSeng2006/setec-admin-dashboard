<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setec | Orders Admin</title>
    <link rel="stylesheet" href="/Germinai-style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-img-container">
                    <img src="https://final-projact-y2-s2-crud-io.vercel.app/image/logo.png"
                         onerror="this.src='https://i.imgur.com/7EszX8v.png'" alt="SETEC Logo">
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a>
                <a href="products.html" class="menu-item"><i class="fa-solid fa-box"></i> <span>Products</span></a>
                <a href="categories.html" class="menu-item"><i class="fa-solid fa-tags"></i> <span>Categories</span></a>
                <a href="orders.html" class="menu-item"><i class="fa-solid fa-cart-shopping"></i> <span>Orders</span></a>
                <a href="users.html" class="menu-item"><i class="fa-solid fa-users"></i> <span>Users</span></a>
                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="toggle-btn" id="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                    <div class="welcome-msg">
                        <h1>Orders</h1>
                        <p>Manage customer orders</p>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search orders...">
                    </div>
                    <div class="notification-icon">
                        <i class="fa-solid fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <div class="profile-container">
                        <div class="profile-dropdown-trigger" id="profileTrigger">
                            <span class="profile-name">Dara</span>
                            <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="profile-img">
                            <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i>
                        </div>
                        <div class="profile-dropdown-menu" id="profileDropdown">
                            <div class="dropdown-user-info">
                                <h4 class="profile-name">Dara</h4>
                                <p>Administrator</p>
                            </div>
                            <hr class="dropdown-divider">
                            <a href="settings.html" class="dropdown-item"><i class="fa-solid fa-gear"></i> Settings</a>
                            <hr class="dropdown-divider">
                            <a href="#" class="dropdown-item text-danger" id="logoutTriggerBtn">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-action-header">
                <h2>Orders Management</h2>
                <button type="button" id="btn-add-order" class="btn-add">
                    <i class="fa-solid fa-plus"></i> Add Order
                </button>
            </div>

            <div class="data-card">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>ORDER NAME</th>
                                <th>QUANTITY</th>
                                <th>DATE</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
<div id="orderModalOverlay" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="orderModalTitle">Add Order</h3>
            <button type="button" class="close-modal-btn" onclick="window.closeOrderModal()">&times;</button>
        </div>
        <form id="modalOrderForm">
            <div class="modal-body">
                <div class="modal-group">
                    <label for="modalOrderName">Order Name</label>
                    <input type="text" id="modalOrderName" placeholder="Enter customer name">
                </div>
                <div class="modal-group">
                    <label for="modalOrderProduct">Product</label>
                    <select id="modalOrderProduct">
                        <option value="">Select Product</option>
                    </select>
                </div>
                <div class="modal-group">
                    <label for="modalOrderQty">Quantity</label>
                    <input type="number" id="modalOrderQty" placeholder="Enter quantity">
                </div>
                <div class="modal-group">
                    <label for="modalOrderDate">Date</label>
                    <input type="date" id="modalOrderDate" value="2026-06-21">
                </div>
                <div class="modal-group">
                    <label for="modalOrderStatus">Status</label>
                    <select id="modalOrderStatus">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="window.closeOrderModal()">Cancel</button>
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-check"></i> Save Order
                </button>
            </div>
        </form>
    </div>
</div>
   

    <script src="/Germinai-style/script.js"></script>
</body>

</html>
