<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setec | Users Admin</title>
    <link rel="stylesheet" href="/Germinai-style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-img-container"><img src="https://final-projact-y2-s2-crud-io.vercel.app/image/logo.png"
                        onerror="this.src='https://i.imgur.com/7EszX8v.png'" alt="SETEC Logo"></div>

            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a>
                <a href="products.html" class="menu-item"><i class="fa-solid fa-box"></i> <span>Products</span></a>
                <a href="categories.html" class="menu-item"><i class="fa-solid fa-tags"></i> <span>Categories</span></a>
                <a href="orders.html" class="menu-item"><i class="fa-solid fa-cart-shopping"></i>
                    <span>Orders</span></a>
                <a href="users.html" class="menu-item"><i class="fa-solid fa-users"></i> <span>Users</span></a>
                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="toggle-btn" id="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                    <div class="welcome-msg">
                        <h1>Users</h1>
                        <p>Manage your users</p>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text"
                            placeholder="Search users..."></div>
                    <div class="notification-icon"><i class="fa-solid fa-bell"></i><span class="badge">3</span></div>
                    <div class="profile-container">
                        <div class="profile-dropdown-trigger" id="profileTrigger"><span
                                class="profile-name">Dara</span><img src="https://i.pravatar.cc/150?img=11" alt="Avatar"
                                class="profile-img"><i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i>
                        </div>
                        <div class="profile-dropdown-menu" id="profileDropdown">
                            <div class="dropdown-user-info">
                                <h4 class="profile-name">Dara</h4>
                                <p>Administrator</p>
                            </div>
                            <hr class="dropdown-divider">
                            <a href="settings.html" class="dropdown-item"><i class="fa-solid fa-gear"></i> Settings</a>
                            <hr class="dropdown-divider">
                            <!-- Updated trigger ID attribute added right here below -->
                            <a href="#" class="dropdown-item text-danger" id="logoutTriggerBtn"><i
                                    class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-action-header">
                <h2>Users Management</h2>
               
                <button class="btn-add" onclick="openUserModal()">+ Add User</button>
            </div>

            <div class="data-card">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>NAME</th>
                                <th>EMAIL</th>
                                <th>ROLE</th>
                                <th>STATUS</th>
                                <th>PHONE</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <!-- THE ANCHOR POPUP MODAL WRAPPER -->
<div class="custom-modal-overlay" id="userModalOverlay">
    <div class="user-modal-card">
        <!-- Teal Header Section matching Screenshot 2026-06-20 114239.png -->
        <div class="modal-card-header">
            <h3 id="modalFormTitle">Add User</h3>
            <button type="button" class="close-modal-x" onclick="closeUserModal()">&times;</button>
        </div>

        <!-- Integrated Form Control Module -->
        <form id="modalUserForm" novalidate>
            <!-- Row 1: Dual Column Name Matrix -->
            <div class="form-modal-row">
                <div class="modal-group">
                    <label>First Name</label>
                    <input type="text" id="modalFirstName" placeholder="Enter first name">
                    <div class="modal-error-text" id="errModalFirstName">First name is required</div>
                </div>
                <div class="modal-group">
                    <label>Last Name</label>
                    <input type="text" id="modalLastName" placeholder="Enter last name">
                    <div class="modal-error-text" id="errModalLastName">Last name is required</div>
                </div>
            </div>

            <!-- Row 2: Standard Single Column Email Block -->
            <div class="modal-group">
                <label>Email</label>
                <input type="email" id="modalEmail" placeholder="user@example.com">
                <div class="modal-error-text" id="errModalEmail">A valid email is required</div>
            </div>

            <!-- Row 3: Dual Column Dropdowns -->
            <div class="form-modal-row">
                <div class="modal-group">
                    <label>Role</label>
                    <select id="modalRole">
                        <option value="User">User</option>
                        <option value="Admin">Admin</option>
                        <option value="Manager">Manager</option>
                    </select>
                </div>
                <div class="modal-group">
                    <label>Status</label>
                    <select id="modalStatus">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>

            <!-- Row 4: Single Column Phone Input -->
            <div class="modal-group">
                <label>Phone</label>
                <input type="text" id="modalPhone" placeholder="+855 12 345 678">
                <div class="modal-error-text" id="errModalPhone">Phone number is required</div>
            </div>

            <!-- Row 5: Action Footer Buttons Alignment -->
            <div class="modal-action-footer">
                <button type="button" class="btn-modal-cancel" onclick="closeUserModal()">Cancel</button>
                <button type="submit" class="btn-modal-save">
                    <i class="fa-solid fa-check"></i> Save User
                </button>
            </div>
        </form>
    </div>
</div>
    <script src="/Germinai-style/script.js"></script>
</body>

</html>
